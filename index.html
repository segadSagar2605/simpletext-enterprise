<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimpleText Enterprise | Document Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #3b82f6;
            --primary-dark: #1e40af;
            --background-base: #f9fafb;
            --background-secondary: #f3f4f6;
            --border-subtle: #e5e7eb;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --text-tertiary: #9ca3af;
            --success-color: #10b981;
            --error-color: #ef4444;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        body, html { 
            height: 100%; 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif; 
            overflow: hidden; 
            background-color: var(--background-base); 
            color: var(--text-primary);
        }

        .app-shell { 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }

        header {
            height: 64px; 
            background: #ffffff; 
            border-bottom: 1px solid var(--border-subtle);
            display: flex; 
            align-items: center; 
            padding: 0 32px; 
            justify-content: space-between;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }

        .logo { 
            font-weight: 700; 
            font-size: 1.25rem; 
            color: var(--primary-color);
            letter-spacing: -0.5px;
        }

        .main-content { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
        }

        .sidebar {
            width: 320px; 
            background: #ffffff; 
            border-right: 1px solid var(--border-subtle);
            padding: 24px; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-section-title {
            font-size: 0.75rem; 
            font-weight: 700; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }
        
        input, select, textarea {
            width: 100%; 
            padding: 10px 12px; 
            border: 1px solid var(--border-subtle); 
            border-radius: 8px;
            font-size: 0.875rem; 
            box-sizing: border-box;
            font-family: inherit;
            background-color: #ffffff;
            transition: all 0.2s ease;
        }

        input:focus, select:focus, textarea:focus { 
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        input::placeholder, textarea::placeholder {
            color: var(--text-tertiary);
        }

        .btn-action {
            background: var(--primary-color); 
            color: #ffffff; 
            border: none; 
            padding: 12px 16px;
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 8px;
            font-size: 0.875rem;
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }

        .btn-action:hover {
            background: var(--primary-dark);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .btn-action:active {
            transform: translateY(0);
            box-shadow: var(--shadow-sm);
        }

        /* Traffic Light UI: Disabled State (Orange) */
        .btn-action:disabled {
            background: #f59e0b;
            cursor: not-allowed;
            opacity: 0.7;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
            animation: pulse-orange 2s infinite;
        }

        .btn-action:disabled:hover {
            background: #f59e0b;
            transform: none;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
        }

        /* Traffic Light UI: Enabled State (Green) */
        .btn-action:not(:disabled) {
            background: var(--primary-color);
            animation: pulse-green 0.6s ease-out;
        }

        /* Pulse animations for status indication */
        @keyframes pulse-orange {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 0.9; }
        }

        @keyframes pulse-green {
            0% { 
                background: var(--success-color);
                box-shadow: 0 0 12px 3px rgba(16, 185, 129, 0.3);
            }
            100% { 
                background: var(--primary-color);
                box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
            }
        }

        .workspace { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            padding: 16px; 
            overflow: hidden; 
            gap: 12px;
        }

        .workspace-header {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .workspace-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0;
        }

        .workspace-header p {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin: 0;
        }

        .search-container { 
            display: flex; 
            align-items: center; 
            gap: 0;
            flex-shrink: 0; 
            position: relative;
        }

        .search-input { 
            font-size: 0.8125rem; 
            padding: 8px 12px 8px 36px; 
            border-radius: 8px; 
            border: 1px solid var(--border-subtle);
            background-color: #ffffff;
            transition: all 0.2s ease;
            min-width: 300px;
        }

        .search-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Traffic Light UI: Search Input Disabled (Orange) */
        .search-input:disabled {
            background-color: #fee7ce;
            cursor: not-allowed;
            opacity: 0.6;
            border-color: #f59e0b;
            box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.1);
            animation: pulse-orange 2s infinite;
        }

        /* Traffic Light UI: Search Input Enabled (Green Pulse) */
        .search-input:not(:disabled) {
            animation: pulse-green-input 0.5s ease-out;
        }

        @keyframes pulse-green-input {
            0% { 
                background-color: #dcfce7;
                border-color: #10b981;
                box-shadow: 0 0 8px 2px rgba(16, 185, 129, 0.2);
            }
            100% { 
                background-color: #ffffff;
                border-color: #d1d5db;
                box-shadow: none;
            }
        }

        .search-input.error-state {
            border-color: var(--error-color);
            background-color: #fef2f2;
        }

        .search-input.error-state::placeholder {
            color: var(--error-color);
        }

        .search-icon {
            position: absolute;
            left: 11px;
            color: var(--text-tertiary);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .scroll-canvas { 
            flex: 1; 
            background: #ffffff; 
            border: 1px solid var(--border-subtle); 
            border-radius: 8px; 
            overflow-y: auto;
            box-shadow: var(--shadow-sm);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.8125rem; 
            font-family: inherit;
            table-layout: fixed;
        }
        
        th { 
            text-align: left; 
            padding: 8px 12px; 
            background: #ffffff; 
            position: sticky; 
            top: 0; 
            z-index: 10; 
            border-bottom: 2px solid #d1d5db;
            color: var(--text-primary);
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        tbody tr {
            transition: background-color 0.15s ease;
        }

        tbody tr:hover {
            background-color: rgba(59, 130, 246, 0.04);
        }

        td { 
            padding: 8px 12px; 
            border-bottom: 1px solid var(--border-subtle); 
            vertical-align: middle; 
            font-family: inherit;
            background-color: #ffffff;
        }

        td strong {
            color: var(--text-primary);
            font-weight: 600;
        }

        .col-title {
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
        }

        .col-author {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
        }

        .col-summary { 
            color: var(--text-secondary); 
            max-width: 200px;
            line-height: 1.3;
            font-size: 0.8125rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
            word-break: break-word;
        }

        .col-type {
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: help;
        }

        .col-path { 
            color: var(--text-tertiary); 
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.7rem;
            max-width: 120px; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        #status-bar { 
            font-size: 0.8125rem; 
            font-weight: 500; 
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--success-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="app-shell">
    <header>
        <div class="logo">SimpleText</div>
        <div id="status-bar">
            <span class="status-indicator"></span>
            <span>Connected</span>
        </div>
    </header>

    <div class="main-content">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">Add New Document</div>
                <input type="file" id="field_file" style="border: 1px solid var(--border-subtle); padding: 10px 12px; cursor: pointer; border-radius: 8px;">
                <select id="field_type" title="Select file type">
                    <option value="PDF" disabled selected hidden>File Type</option>
                    <option value="PDF">PDF Document</option>
                    <option value="Word">Word (.docx)</option>
                    <option value="Excel">Excel (.xlsx)</option>
                </select>
            </div>

            <div class="sidebar-section">
                <div class="sidebar-section-title">Document Information</div>
                <input type="text" id="field_title" placeholder="Document Title">
                <input type="text" id="field_author" placeholder="Author or Owner">
                <textarea id="field_summary" rows="4" placeholder="Brief summary of content..."></textarea>
            </div>

            <button class="btn-action" id="uploadBtn" onclick="executeUpload()" disabled>Upload document</button>
        </aside>

        <main class="workspace">
            <div class="workspace-header">
                <h1>Document Library</h1>
                <p>Manage and search all your ingested documents</p>
            </div>

            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchInput" 
                    class="search-input"
                    placeholder="Search documents..." 
                    onkeypress="handleKeyPress(event)"
                    disabled>
            </div>
            
            <div class="scroll-canvas">
                <table>
                    <thead>
                        <tr>
                            <th>Document Title</th>
                            <th>Author</th>
                            <th>Content Summary</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Internal Path</th>
                            <th>Added On</th>
                        </tr>
                    </thead>
                    <tbody id="table_rows">
                        </tbody>
                </table>
            </div>
        </main>
    </div>
</div>

<script>
    const SERVER_URL = "http://127.0.0.1:8000";

    /**
     * Auto-capture title and type when a file is selected
     */
    function handleFileSelect() {
        const fileInput = document.getElementById('field_file');
        const titleInput = document.getElementById('field_title');
        const typeSelect = document.getElementById('field_type');
        
        if (fileInput.files[0]) {
            const file = fileInput.files[0];
            const fileName = file.name;
            const fileExtension = fileName.split('.').pop().toLowerCase();
            
            // Auto-populate title with filename (without extension)
            const titleWithoutExt = fileName.substring(0, fileName.lastIndexOf('.')) || fileName;
            titleInput.value = titleWithoutExt;
            
            // Auto-set type based on file extension
            const extensionMap = {
                'pdf': 'PDF',
                'docx': 'Word',
                'doc': 'Word',
                'xlsx': 'Excel',
                'xls': 'Excel'
            };
            
            const detectedType = extensionMap[fileExtension] || 'PDF';
            typeSelect.value = detectedType;
        }
    }

    // Attach file select handler
    document.getElementById('field_file').addEventListener('change', handleFileSelect);

    /**
     * Form validation - enables upload button when required fields are filled
     */
    function validateForm() {
        const fileInput = document.getElementById('field_file');
        const typeSelect = document.getElementById('field_type');
        const uploadBtn = document.getElementById('uploadBtn');
        
        // Check if file is selected
        const hasFile = fileInput.files && fileInput.files.length > 0;
        
        // Check if file type is selected (not placeholder - anything other than PDF which is the default placeholder)
        const hasType = typeSelect.selectedIndex > 0;
        
        // Enable button if both file and type are selected
        if (hasFile && hasType) {
            uploadBtn.disabled = false;
            console.log("✓ Form validation passed - upload button enabled (form completed)");
        } else {
            // Only disable if button is not already controlled by system status
            // Check if there's a system that's managing button state
            uploadBtn.disabled = true;
            console.log("✗ Form validation: Missing file or file type");
        }
    }

    // Attach form field change handlers for validation
    document.getElementById('field_file').addEventListener('change', function() {
        handleFileSelect();
        validateForm();
    });
    
    document.getElementById('field_type').addEventListener('change', validateForm);

    /**
     * Handles the file upload and metadata persistence.
     */
    async function executeUpload() {
        const status = document.getElementById('status-bar');
        const fileInput = document.getElementById('field_file');
        
        if (!fileInput.files[0]) {
            alert("Please select a file to upload.");
            return;
        }

        const payload = new FormData();
        payload.append("file", fileInput.files[0]);
        payload.append("title", document.getElementById('field_title').value || "Untitled");
        payload.append("created_by", document.getElementById('field_author').value || "Admin");
        payload.append("content_summary", document.getElementById('field_summary').value || "");
        payload.append("doc_type", document.getElementById('field_type').value);

        status.innerText = "Ingesting...";
        
        try {
            const response = await fetch(`${SERVER_URL}/upload`, { method: "POST", body: payload });
            if (response.ok) {
                status.innerText = "Upload Successful";
                refreshLibrary();
                // Clear inputs for next entry
                document.getElementById('field_title').value = "";
                document.getElementById('field_author').value = "";
                document.getElementById('field_summary').value = "";
                document.getElementById('field_type').value = "PDF"; // Reset to placeholder
                fileInput.value = "";
                validateForm(); // Re-validate form - button will be disabled
            }
        } catch (error) {
            status.innerText = "Network Error";
            console.error(error);
        }
    }

    /**
     * Fetches the complete document list from the backend.
     */
    async function refreshLibrary() {
        try {
            const response = await fetch(`${SERVER_URL}/get-docs`);
            const data = await response.json();
            updateTable(data);
        } catch (error) {
            console.error("Failed to load document library", error);
        }
    }
    function handleKeyPress(event) {
        if (event.key === "Enter") {
            executeSearch();
        }
    }
    /**
     * Filters the document list based on the user's search query.
     */
    async function executeSearch() {
        const searchInput = document.getElementById('searchInput');
        const query = searchInput.value;

        // 1. Error Case: Under 3 characters
        if (query.length > 0 && query.length < 3) {
            const originalPlaceholder = "Search content and press Enter...";
            
            searchInput.value = ""; 
            searchInput.placeholder = "Error: Minimum 3 characters required";
            searchInput.classList.add('error-state'); 

            setTimeout(() => {
                searchInput.placeholder = originalPlaceholder;
                searchInput.classList.remove('error-state');
            }, 2500);
            
            return;
        }

        // 2. Empty Case (Reset)
        if (!query.trim()) return refreshLibrary();

        // 3. Normal Search Case
        try {
            const response = await fetch(`${SERVER_URL}/search?q=${encodeURIComponent(query)}`);
            const data = await response.json();
            updateTable(data);
        } catch (error) {
            console.error("Search failed", error);
        }
    }
    /**
     * Truncate summary to 50 characters for display, keep full text in title attribute
     */
    function truncateSummary(text, maxLength = 50) {
        if (!text) return 'No summary available';
        return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
    }

    /**
     * Renders the document rows into the HTML table.
     */
    function updateTable(documents) {
        const container = document.getElementById('table_rows');
        
        if (documents.length === 0) {
            container.innerHTML = "<tr><td colspan='7' style='text-align:center; padding: 40px; color: #94a3b8;'>No records found.</td></tr>";
            return;
        }

        container.innerHTML = documents.map(doc => {
            const fullTitle = (doc.title || 'Untitled').replace(/"/g, '&quot;');
            const fullAuthor = (doc.author || 'N/A').replace(/"/g, '&quot;');
            const fullSummary = (doc.summary || 'No summary available').replace(/"/g, '&quot;');
            const displaySummary = truncateSummary(doc.summary || 'No summary available', 50);
            const statusId = `status-cell-${doc.id}`;
            const statusColor = getStatusColor(doc.status);
            return `
            <tr data-doc-id="${doc.id}">
                <td class="col-title" title="${fullTitle}"><strong>${doc.title}</strong></td>
                <td class="col-author" title="${fullAuthor}">${doc.author}</td>
                <td class="col-summary" title="${fullSummary}">${displaySummary}</td>
                <td class="col-type" title="${doc.type}">${doc.type}</td>
                <td id="${statusId}" class="col-status" style="color: ${statusColor}; font-weight: 500;">${doc.status}</td>
                <td class="col-path" title="${doc.path}">${doc.path}</td>
                <td>${doc.date.split(' ')[0]}</td>
            </tr>
        `}).join('');
    }

    /**
     * Get color for status display
     */
    function getStatusColor(status) {
        switch(status) {
            case 'Pending': return '#f59e0b';  // Orange
            case 'Indexing': return '#3b82f6';  // Blue
            case 'Ready': return '#10b981';     // Green
            case 'Failed': return '#ef4444';    // Red
            default: return '#6b7280';          // Gray
        }
    }

    // Initial data load on page startup
    window.onload = function() {
        refreshLibrary();
        checkSystemStatus();  // Check if system is already ready
        initializePipelineTracker();
    };

    /**
     * Check system status via HTTP endpoint
     * Enables buttons immediately if AI engine is already ready
     */
    async function checkSystemStatus() {
        try {
            const response = await fetch(`${SERVER_URL}/status`);
            const data = await response.json();
            
            if (data.ready) {
                console.log("[Status Check] AI Engine already ready - enabling buttons");
                const uploadBtn = document.getElementById('uploadBtn');
                const searchInput = document.getElementById('searchInput');
                uploadBtn.disabled = false;
                searchInput.disabled = false;
                document.getElementById('status-bar').querySelector('span:last-child').textContent = "AI Engine Ready";
            }
        } catch (error) {
            console.log("[Status Check] Could not verify status:", error);
        }
    }

    /**
     * Initialize WebSocket connection for real-time pipeline status with Traffic Light UI
     */
    function initializePipelineTracker() {
        const statusBar = document.getElementById('status-bar');
        const statusText = statusBar.querySelector('span:last-child');
        const uploadBtn = document.getElementById('uploadBtn');
        const searchInput = document.getElementById('searchInput');
        const WS_URL = "ws://127.0.0.1:8000/ws/pipeline_status";
        
        // Traffic Light State: Buttons disabled on page load (orange)
        let systemReady = false;
        
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;
        let resetTimer = null;

        /**
         * Enable buttons when system is ready (green light)
         */
        function enableButtons() {
            if (systemReady) return;  // Already enabled
            systemReady = true;
            
            uploadBtn.disabled = false;
            searchInput.disabled = false;
            
            console.log("✓ Traffic Light: SYSTEM_READY - Buttons enabled (green)");
            statusText.textContent = "AI Engine Ready";
        }

        /**
         * Disable buttons when system is not ready (orange light)
         */
        function disableButtons() {
            if (!systemReady) return;  // Already disabled
            systemReady = false;
            
            uploadBtn.disabled = true;
            searchInput.disabled = true;
            
            console.log("✗ Traffic Light: System offline - Buttons disabled (orange)");
            statusText.textContent = "AI Engine Initializing...";
        }

        function connectWebSocket() {
            try {
                ws = new WebSocket(WS_URL);
                reconnectAttempts = 0;
                const refreshScheduled = new Set();  // Track which docs are scheduled for refresh
                
                ws.onopen = function() {
                    console.log("✓ WebSocket connected to pipeline status");
                    statusText.textContent = "Initializing AI Engine...";
                };
                
                ws.onmessage = function(event) {
                    const packet = JSON.parse(event.data);
                    const type = packet.type;
                    const message = packet.message || "Pipeline Update";
                    const eventData = packet.data || {};
                    const docId = eventData.doc_id;
                    const eventName = eventData.event;
                    
                    // ===== TRAFFIC LIGHT CONTROL: Listen for SYSTEM_READY =====
                    if (type === "SYSTEM_READY") {
                        console.log("[SYSTEM_READY] AI Engine initialized and ready");
                        enableButtons();
                        statusText.textContent = "AI Engine Ready";
                        return;  // Don't process as regular event
                    }
                    
                    // ===== LIVE PULSE STATUS UPDATES =====
                    if (eventName) {
                        if (eventName.includes("Embedding")) {
                            statusText.textContent = `📊 ${eventName}`;
                        } else if (eventName.includes("Ready")) {
                            statusText.textContent = "✅ Document ready for search";
                        } else if (eventName.includes("Indexing")) {
                            statusText.textContent = "🔄 Indexing in progress...";
                        } else if (eventName.includes("Failed")) {
                            statusText.textContent = "❌ Indexing failed";
                        } else {
                            statusText.textContent = message;
                        }
                    } else {
                        statusText.textContent = message;
                    }
                    
                    // Update specific row status
                    if (docId && (eventName.includes("Indexing") || eventName.includes("Ready") || eventName.includes("Failed"))) {
                        const statusCell = document.getElementById(`status-cell-${docId}`);
                        if (statusCell) {
                            let status = "Indexing";
                            if (eventName.includes("Ready")) {
                                status = "Ready";
                            } else if (eventName.includes("Failed")) {
                                status = "Failed";
                            } else if (eventName.includes("Pending")) {
                                status = "Pending";
                            }
                            
                            statusCell.textContent = status;
                            statusCell.style.color = getStatusColor(status);
                        }
                    }
                    
                    // DEBOUNCE: Only schedule ONE refresh per document to prevent multiple refreshes
                    if (eventName && eventName.includes("Ready") && docId && !refreshScheduled.has(docId)) {
                        refreshScheduled.add(docId);  // Mark this doc as scheduled for refresh
                        
                        resetTimer = setTimeout(function() {
                            console.log(`[Refresh] Refreshing table after document ${docId} ready`);
                            statusText.textContent = "Ready ✓";
                            refreshLibrary();  // Single refresh per document
                            refreshScheduled.delete(docId);  // Allow future refreshes for this doc
                            resetTimer = null;
                        }, 2000);  // Reduced from 3000ms for faster feedback
                    }
                };
                
                ws.onerror = function(error) {
                    console.error("WebSocket error:", error);
                    disableButtons();
                };
                
                ws.onclose = function() {
                    console.log("WebSocket disconnected. Attempting to reconnect...");
                    disableButtons();
                    
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 10000);
                        setTimeout(connectWebSocket, delay);
                    } else {
                        statusText.textContent = "Connection Lost";
                        console.warn("Max reconnection attempts reached");
                    }
                };
            } catch (error) {
                console.error("Failed to connect WebSocket:", error);
                disableButtons();
            }
        }

        // Initial connection
        connectWebSocket();
    }

</script>
